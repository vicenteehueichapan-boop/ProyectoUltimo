<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>APEX PREDATOR V9 — Live Solver</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════
   RESET & BASE
═══════════════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#0d0f12;min-height:100vh;font-family:'Inter',sans-serif;color:#e2e8f0;overflow-x:hidden}
input,button,textarea{font-family:inherit}
button{cursor:pointer}
#app{max-width:560px;margin:0 auto;padding-bottom:60px}

/* ═══════════════════════════════════
   HEADER
═══════════════════════════════════ */
.app-header{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;background:linear-gradient(180deg,#17191e 0%,#0d0f12 100%);border-bottom:1px solid #1e2128;position:sticky;top:0;z-index:50}
.logo-block{display:flex;align-items:center;gap:10px}
.logo-dot{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#ef4444,#dc2626);display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:900;flex-shrink:0}
.logo-title{font-size:13px;font-weight:900;color:#f8fafc;letter-spacing:.02em}
.logo-v{color:#ef4444}
.logo-sub{font-size:9px;color:#475569;font-weight:700;letter-spacing:.08em}
.hdr-btn{background:#1e2128;border:1px solid #272b35;border-radius:8px;padding:7px 10px;font-size:16px;color:#94a3b8;transition:.2s}
.hdr-btn:hover{background:#272b35;color:#f8fafc}

/* ═══════════════════════════════════
   TOOLS MENU
═══════════════════════════════════ */
.tools-menu{position:fixed;right:12px;top:58px;background:#17191e;border:1px solid #272b35;border-radius:10px;padding:6px;z-index:200;box-shadow:0 8px 30px rgba(0,0,0,.9);display:flex;flex-direction:column;gap:2px;min-width:200px}
.t-btn{background:transparent;border:none;color:#cbd5e1;font-size:12px;font-weight:600;text-align:left;padding:9px 14px;border-radius:6px;transition:.2s}
.t-btn:hover{background:#272b35;color:#fff}
.t-btn.green{color:#4ade80}
.t-btn.blue{color:#60a5fa}
.t-sep{height:1px;background:#1e2128;margin:2px 6px}

/* ═══════════════════════════════════
   MESA / FELT
═══════════════════════════════════ */
.tbl-wrap{position:relative;width:100%;height:270px;margin:16px auto}
.felt{
  position:absolute;top:35px;left:25px;right:25px;bottom:55px;
  background:radial-gradient(ellipse at 50% 40%,#1a5c42 0%,#0e3828 55%,#061e15 100%);
  border-radius:140px/80px;
  border:4px solid #237a50;
  box-shadow:0 0 0 6px #020e08,0 20px 50px rgba(0,0,0,.9),inset 0 0 40px rgba(0,0,0,.5)
}
.pot-lbl{position:absolute;top:8px;left:50%;transform:translateX(-50%);font-size:11px;font-weight:800;color:#fbbf24;background:rgba(0,0,0,.7);padding:3px 12px;border-radius:20px;border:1px solid #b45309;z-index:5;white-space:nowrap}

/* Board cards */
.board-row{position:absolute;top:46%;left:50%;transform:translate(-50%,-50%);display:flex;gap:5px;z-index:4}
.bc{width:36px;height:50px;border-radius:5px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:.15s;border:1.5px solid transparent}
.bc.filled{background:#fff;border-color:#d1d5db}
.bc.filled.red{border-color:#fca5a5}
.bc.filled.dark{border-color:#94a3b8}
.bc.empty{background:rgba(0,0,0,.35);border:1.5px dashed rgba(255,255,255,.2)}
.bc.empty.active{border-color:#fbbf24;background:rgba(251,191,36,.15)}
.bc-lbl{font-size:8px;color:rgba(255,255,255,.3);font-weight:800}
.c-r{font-size:15px;font-weight:900;line-height:1}
.c-s{font-size:11px;line-height:1}
.c-r.big{font-size:19px}
.c-s.big{font-size:13px}

/* Villain seats */
.vst{position:absolute;text-align:center;width:68px;z-index:3;cursor:pointer;display:flex;flex-direction:column;align-items:center;transition:.15s}
.vst:active{transform:scale(.95)}
.vp0{top:35%;left:-4%}
.vp1{top:-6%;left:10%}
.vp2{top:-6%;right:10%}
.vp3{top:35%;right:-4%}
.vp4{bottom:-6%;right:4%}

.v-av{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,#1e2432,#0f1520);border:2px solid #2d3548;display:flex;align-items:center;justify-content:center;position:relative;box-shadow:0 4px 12px rgba(0,0,0,.6);transition:.2s}
.v-av.empty{background:#13151a;border:2px dashed #1e2128}
.v-av.folded{opacity:.25}
.v-av-inner{width:100%;height:100%;background:url('https://api.dicebear.com/7.x/bottts-neutral/svg?seed=apex&backgroundColor=1e293b') center/cover;border-radius:50%}
.v-nm-box{background:rgba(0,0,0,.75);border:1px solid #1e2128;border-radius:5px;padding:2px 5px;margin-top:-5px;z-index:5;width:100%}
.v-nm{font-size:9px;font-weight:700;color:#f8fafc;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.v-nm.empty{color:#374151}
.v-st{font-size:8px;font-weight:700;color:#64748b;margin-top:1px}
.dlr{position:absolute;top:-4px;right:-4px;width:17px;height:17px;border-radius:50%;background:linear-gradient(145deg,#ef4444,#991b1b);border:1.5px solid #fff;color:#fff;font-size:8px;font-weight:900;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(0,0,0,.7);z-index:6}
.pos-pip{position:absolute;bottom:-4px;left:-4px;padding:1px 4px;border-radius:3px;font-size:7px;font-weight:900;color:#000}

/* Hero seat */
.hero-seat{position:absolute;bottom:-22px;left:50%;transform:translateX(-50%);text-align:center;z-index:4;display:flex;flex-direction:column;align-items:center}
.hero-cards{display:flex;gap:3px;margin-bottom:-8px;z-index:1}
.hc{width:44px;height:60px;border-radius:6px;border:2px solid #2d3548;background:#1a1f2e;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 -4px 12px rgba(0,0,0,.6);transition:.15s}
.hc.filled{background:#fff;border-color:#94a3b8}
.hc.filled.red{border-color:#fca5a5}
.hc.filled.dark{border-color:#64748b}
.hc.active{border-color:#fbbf24;background:rgba(251,191,36,.25)}
.hc-lbl{font-size:11px;color:rgba(255,255,255,.35);font-weight:900}
.hero-info{background:linear-gradient(180deg,#1a1f2e,#0f1520);border:2px solid #3b82f6;border-radius:8px;padding:5px 14px;z-index:2;box-shadow:0 4px 15px rgba(59,130,246,.2);display:flex;align-items:center;gap:8px}
.pos-pill{padding:2px 8px;border-radius:4px;font-size:10px;font-weight:900;color:#000}

/* ═══════════════════════════════════
   CARD PICKER
═══════════════════════════════════ */
.pkr{background:#17191e;border-radius:10px;padding:12px;margin:0 14px 12px;border:1px solid #272b35}
.pkr-hint{font-size:9px;color:#475569;font-weight:800;text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px}
.rg{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.rb{padding:9px 2px;border-radius:6px;border:1px solid #2d3548;font-size:13px;font-weight:800;background:#13151a;color:#cbd5e1;transition:.15s}
.rb:hover:not(.used){background:#2d3548;color:#fff}
.rb.used{opacity:.18;pointer-events:none}
.sgr{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.sbtn{padding:14px 4px;border-radius:8px;border:2px solid #2d3548;font-size:28px;background:#13151a;transition:.15s}
.sbtn.dark{color:#f8fafc}
.sbtn.red{color:#ef4444}
.sbtn:hover:not(.used){border-color:#475569;background:#272b35}
.sbtn.used{opacity:.18;pointer-events:none}

/* ═══════════════════════════════════
   GEOMETRY INPUTS
═══════════════════════════════════ */
.geo-row{display:flex;gap:8px;padding:0 14px;margin-bottom:12px;align-items:flex-end;flex-wrap:wrap}
.geo-cell{flex:1;min-width:70px;background:#17191e;border:1px solid #272b35;border-radius:8px;padding:8px 10px}
.geo-cell label{display:block;font-size:8px;color:#475569;font-weight:800;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
.geo-cell input{background:transparent;border:none;color:#fbbf24;font-size:16px;font-weight:900;outline:none;width:100%}
.geo-cell input:disabled{color:#374151}
.rotate-btn{background:#272b35;border:1px solid #374151;border-radius:8px;padding:0 14px;height:52px;color:#f8fafc;font-size:14px;font-weight:800;flex-shrink:0;transition:.2s}
.rotate-btn:hover{background:#334155}

/* ═══════════════════════════════════
   ACTION PANEL
═══════════════════════════════════ */
.sec-lbl{font-size:9px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:#475569;padding:0 16px;margin-bottom:6px}
.act-row{display:flex;justify-content:space-between;align-items:center;background:#17191e;border:1px solid #272b35;border-radius:8px;padding:7px 12px;margin:0 14px 5px}
.act-row.fd{opacity:.35;border-color:transparent;background:#13151a}
.act-lbl{font-size:11px;font-weight:700;color:#f8fafc}
.act-btns{display:flex;gap:4px}
.ac-btn{padding:5px 9px;border-radius:4px;border:1px solid #2d3548;font-size:10px;font-weight:800;background:#13151a;color:#64748b;transition:.15s}
.ac-btn:hover{background:#2d3548;color:#f8fafc}
.ac-btn.ck{background:#1a2a3e;color:#60a5fa;border-color:#3b82f6}
.ac-btn.cc{background:#0c2a1a;color:#4ade80;border-color:#16a34a}
.ac-btn.acb{background:#2a1e08;color:#fbbf24;border-color:#d97706}
.ac-btn.cr{background:#2a0f0f;color:#f87171;border-color:#dc2626}
.ac-btn.cf2{background:transparent;color:#374151;border:1px dashed #1e2128}
.folded-tag{font-size:10px;font-weight:800;color:#374151;padding:4px 10px;border:1px solid #1e2128;border-radius:4px}

/* ═══════════════════════════════════
   BRAIN OUTPUT
═══════════════════════════════════ */
.brain-wrap{margin:14px 14px 0}

/* Exploit badges */
.xp-badge{font-size:11px;font-weight:500;padding:7px 10px;border-radius:6px;margin-bottom:4px;line-height:1.4}
.xp-badge.fish{background:rgba(37,99,235,.12);border-left:3px solid #3b82f6;color:#bfdbfe}
.xp-badge.nit{background:rgba(71,85,105,.12);border-left:3px solid #64748b;color:#cbd5e1}
.xp-badge.lag{background:rgba(220,38,38,.12);border-left:3px solid #ef4444;color:#fecaca}
.xp-badge.reg{background:rgba(16,185,129,.12);border-left:3px solid #10b981;color:#a7f3d0}

/* ═══════════════════════════════════
   MDA SECTION
═══════════════════════════════════ */
.mda-section{margin:12px 14px 0}
.mda-card{font-size:11px;font-weight:500;padding:8px 12px;background:rgba(220,38,38,.08);border:1px solid rgba(220,38,38,.2);border-radius:6px;color:#fca5a5;margin-bottom:6px;line-height:1.5}
.mda-card.green{background:rgba(16,185,129,.08);border-color:rgba(16,185,129,.2);color:#a7f3d0}

/* ═══════════════════════════════════
   PROFILE MODAL
═══════════════════════════════════ */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(4px);z-index:300}
.profile-modal{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:320px;background:#17191e;border-radius:12px;border:1px solid #2d3548;z-index:400;box-shadow:0 25px 50px rgba(0,0,0,.9);overflow:hidden}
.pm-head{padding:14px 16px;border-bottom:1px solid #1e2128;display:flex;justify-content:space-between;align-items:center}
.pm-avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#3b82f6,#1d4ed8);display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;font-weight:900;flex-shrink:0}
.pm-name-input{background:transparent;border:none;color:#f8fafc;font-size:15px;font-weight:800;outline:none;width:160px}
.pm-close{background:transparent;border:none;color:#64748b;font-size:18px;padding:4px}
.pm-close:hover{color:#f8fafc}

.ac-drop{position:absolute;top:28px;left:0;width:200px;background:#1e2128;border:1px solid #2d3548;border-radius:6px;box-shadow:0 4px 15px rgba(0,0,0,.8);z-index:500}
.ac-item{padding:8px 12px;font-size:11px;font-weight:600;color:#cbd5e1;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.03)}
.ac-item:hover{background:#2d3548;color:#fff}
.ac-item:last-child{border-bottom:none}

.pm-content{padding:14px 16px}
.pm-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px 5px;margin-bottom:12px;border-bottom:1px solid #1e2128;padding-bottom:12px}
.pm-cell{display:flex;flex-direction:column;align-items:center;border-right:1px solid rgba(255,255,255,.04)}
.pm-cell:nth-child(4n){border-right:none}
.pm-val input{background:transparent;border:none;color:#f8fafc;font-size:14px;font-weight:800;width:36px;text-align:center;outline:none}
.pm-lbl{font-size:8px;color:#475569;font-weight:700;margin-top:3px;text-transform:uppercase;letter-spacing:.06em}
.pm-notes{width:100%;height:72px;background:#13151a;border:1px solid #1e2128;border-radius:6px;padding:8px;font-size:11px;color:#94a3b8;resize:none;outline:none;margin-bottom:10px}
.pm-actions{display:flex;gap:8px}
.pm-save{flex:1;padding:9px;border:none;border-radius:6px;background:#3b82f6;color:#fff;font-size:12px;font-weight:800}
.pm-save:hover{background:#2563eb}
.pm-del{padding:9px 14px;border:1px solid #2d3548;border-radius:6px;background:transparent;color:#64748b;font-size:12px;font-weight:700}
.pm-del:hover{background:#2d3548;color:#f87171}

/* ═══════════════════════════════════
   DATABASE MODAL
═══════════════════════════════════ */
.db-modal{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:340px;max-height:480px;background:#17191e;border-radius:12px;border:1px solid #2d3548;z-index:400;box-shadow:0 25px 50px rgba(0,0,0,.9);display:flex;flex-direction:column}
.db-head{padding:14px 16px;border-bottom:1px solid #1e2128;display:flex;justify-content:space-between;align-items:center;font-size:13px;font-weight:800;color:#f8fafc}
.db-body{overflow-y:auto;flex:1;padding:8px}
.db-empty{padding:24px;text-align:center;color:#374151;font-size:12px}
.db-row{padding:10px;border-radius:6px;cursor:pointer;border-bottom:1px solid #1e2128;transition:.2s}
.db-row:hover{background:#1e2128}
.db-row:last-child{border-bottom:none}
.db-row-name{font-size:13px;font-weight:800;color:#f8fafc;margin-bottom:2px;display:flex;align-items:center;gap:6px}
.db-row-stats{font-size:10px;color:#475569;font-weight:600}

/* ═══════════════════════════════════
   RANGE EDITOR MODAL (Multi-Category)
═══════════════════════════════════ */
.rg-modal{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:700px;height:520px;background:#17191e;border-radius:12px;border:1px solid #2d3548;z-index:400;box-shadow:0 25px 50px rgba(0,0,0,.9);display:flex;flex-direction:column;User-Select:none}
.rg-head{padding:14px 16px;border-bottom:1px solid #1e2128;display:flex;justify-content:space-between;font-size:13px;font-weight:900;color:#f8fafc;flex-shrink:0}

.rg-layout{display:flex;flex:1;overflow:hidden}
.rg-sidebar{width:220px;background:#13151a;border-right:1px solid #1e2128;overflow-y:auto;padding:8px}
.rg-sidebar::-webkit-scrollbar{width:6px}
.rg-sidebar::-webkit-scrollbar-thumb{background:#374151;border-radius:4px}
.rg-cat{font-size:9px;font-weight:800;color:#64748b;padding:8px 8px 4px;margin-top:6px;text-transform:uppercase;letter-spacing:.05em}
.rg-scen{display:block;width:100%;text-align:left;padding:7px 10px;font-size:11px;font-weight:600;color:#e2e8f0;background:transparent;border:1px solid transparent;border-radius:6px;transition:.1s;cursor:pointer}
.rg-scen:hover{background:#1e2128}
.rg-scen.active{background:#2563eb;color:#fff;font-weight:800}

.rg-main{flex:1;display:flex;flex-direction:column;padding:12px;background:#0d0f12}
.rg-brushes{display:flex;gap:6px;margin-bottom:12px}
.br-btn{flex:1;padding:8px;border-radius:6px;border:2px solid transparent;font-size:11px;font-weight:800;color:#fff;cursor:pointer;opacity:.5;transition:.15s}
.br-btn.active{opacity:1;border-color:#fff;box-shadow:0 0 10px rgba(255,255,255,.2)}
.br-R{background:#ef4444}
.br-C{background:#3b82f6}
.br-F{background:#475569}

.rg-board{flex:1;display:grid;grid-template-columns:repeat(13,1fr);gap:2px;background:#1e2128;border-radius:6px;padding:2px;max-height:360px}
.rg-cell{border-radius:3px;border:none;font-size:8px;font-weight:800;display:flex;align-items:center;justify-content:center;cursor:crosshair;transition:.05s;}
.rg-cell.pair{background:#1e293b;color:rgba(255,255,255,.3)}
.rg-cell.suit{background:#0f172a;color:rgba(255,255,255,.2)}
.rg-cell.off{background:#111827;color:rgba(255,255,255,.2)}

/* Active Paint States */
.rg-cell.sel_R{background:#ef4444!important;color:#fff!important;box-shadow:inset 0 0 0 1px rgba(0,0,0,.5)}
.rg-cell.sel_C{background:#3b82f6!important;color:#fff!important;box-shadow:inset 0 0 0 1px rgba(0,0,0,.5)}

.rg-foot{padding:12px 14px;border-top:1px solid #1e2128;display:flex;gap:8px;background:#17191e;flex-shrink:0}

/* ═══════════════════════════════════
   UTILS
═══════════════════════════════════ */
.hidden{display:none!important}

/* ═══════════════════════════════════
   STRATEGY CENTER MODAL
═══════════════════════════════════ */
.sc-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(6px);z-index:600}
.sc-modal{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:min(96vw,820px);height:min(94vh,700px);background:#0d0f12;border-radius:14px;border:1px solid #7c3aed;z-index:601;box-shadow:0 30px 80px rgba(124,58,237,.3);display:flex;flex-direction:column;overflow:hidden}
</style>
</head>
<body>

    <div style="width:40px;height:40px;border-radius:50%;background:#ef4444;display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;font-weight:900">A</div>
